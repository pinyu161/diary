<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日記錄 — 我的日記</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a class="nav-brand" href="/" id="nav-brand">📓 的日記</a>
  <div class="nav-links">
    <a href="/">首頁</a>
    <a href="/record" class="active">記錄</a>
    <a href="/calendar">月曆</a>
    <a href="/stats">統計</a>
  </div>
</nav>

<div class="page">
  <div class="card">
    <div class="card-title">📅 記錄日期</div>
    <div class="form-row">
      <input type="date" id="record-date">
    </div>
  </div>

  <!-- 身體狀況 -->
  <div class="card">
    <div class="card-title">👤 身體狀況</div>
    <div class="form-grid">
      <div class="form-row">
        <label>體重（kg）🐖</label>
        <input type="number" id="weight" placeholder="例：52.3" step="0.1" min="20" max="200">
      </div>
      <div class="form-row">
        <label>今天有沒有大便 💩</label>
        <label class="check-row" style="margin-top:0;">
          <input type="checkbox" id="had-bowel">
          <span>有！順利排便 💩</span>
        </label>
      </div>
    </div>
    <div class="form-row">
      <label>喝水量 💧</label>
      <div class="water-display"><span id="water-val">1500</span> ml</div>
      <input type="range" id="water-ml" min="0" max="4000" step="100" value="1500">
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--brown-light);margin-top:4px;">
        <span>0 ml</span><span>2000 ml</span><span>4000 ml</span>
      </div>
    </div>
    <div class="form-row">
      <label>今日運動 🏋🏻‍♀️</label>
      <input type="text" id="exercise" placeholder="例：跑步30分鐘、瑜珈、散步（沒有就留空）">
    </div>
  </div>

  <!-- 飲食 -->
  <div class="card">
    <div class="card-title">🤤 三餐記錄</div>
    <div class="form-row">
      <label>早餐 🥯</label>
      <input type="text" id="breakfast" placeholder="例：吐司、豆漿、水煮蛋">
    </div>
    <div class="form-row">
      <label>午餐 🍱</label>
      <input type="text" id="lunch" placeholder="例：雞肉飯、燙青菜、蛤蜊湯">
    </div>
    <div class="form-row">
      <label>晚餐 🥗</label>
      <input type="text" id="dinner" placeholder="例：火鍋、沙拉、水果">
    </div>
    <div class="form-row">
      <label>點心／零食 🍨</label>
      <input type="text" id="snack" placeholder="例：珍珠奶茶、餅乾、冰淇淋（沒有就留空）">
    </div>
  </div>

  <!-- 心情 -->
  <div class="card">
    <div class="card-title">🙂 今日心情</div>
    <div class="mood-picker" id="mood-picker">
      <button class="mood-btn" data-emoji="😆" title="哈哈大笑">😆</button>
      <button class="mood-btn" data-emoji="🥹" title="感動">🥹</button>
      <button class="mood-btn" data-emoji="🥲" title="含淚微笑">🥲</button>
      <button class="mood-btn" data-emoji="🙂" title="還不錯">🙂</button>
      <button class="mood-btn" data-emoji="🥰" title="超愛">🥰</button>
      <button class="mood-btn" data-emoji="😋" title="好吃好爽">😋</button>
      <button class="mood-btn" data-emoji="🥳" title="超開心">🥳</button>
      <button class="mood-btn" data-emoji="😔" title="有點難過">😔</button>
      <button class="mood-btn" data-emoji="😕" title="有點困惑">😕</button>
      <button class="mood-btn" data-emoji="😭" title="大哭">😭</button>
      <button class="mood-btn" data-emoji="🤬" title="超生氣">🤬</button>
      <button class="mood-btn" data-emoji="🤯" title="爆頭">🤯</button>
      <button class="mood-btn" data-emoji="😐" title="普通">😐</button>
      <button class="mood-btn" data-emoji="😪" title="好睏">😪</button>
      <button class="mood-btn" data-emoji="😷" title="身體不舒服">😷</button>
    </div>
    <input type="hidden" id="mood-emoji">
  </div>

  <!-- 日記 -->
  <div class="card">
    <div class="card-title">📓 今日日記</div>
    <div class="form-row">
      <label>寫下今天的心情故事吧～</label>
      <textarea id="diary" rows="5" placeholder="今天發生了什麼事呢？有什麼想說的都可以寫在這裡 📓"></textarea>
    </div>
  </div>

  <!-- 感恩 -->
  <div class="card">
    <div class="card-title">🙏🏻 今日感恩三件事</div>
    <div class="form-row">
      <label>感恩第 1 件事</label>
      <input type="text" id="gratitude-1" placeholder="例：今天天氣很好">
    </div>
    <div class="form-row">
      <label>感恩第 2 件事</label>
      <input type="text" id="gratitude-2" placeholder="例：朋友請我吃好吃的">
    </div>
    <div class="form-row">
      <label>感恩第 3 件事</label>
      <input type="text" id="gratitude-3" placeholder="例：今天順利完成作業">
    </div>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px;">
    <button class="btn btn-primary" onclick="saveRecord()">📩 儲存今天的記錄</button>
    <button class="btn btn-secondary" onclick="clearForm()">🗑️ 清除</button>
  </div>
</div>

<div id="toast"></div>

<script>
// 名字
const savedName = localStorage.getItem('diary_username');
if (savedName) document.getElementById('nav-brand').textContent = `📓 ${savedName}的日記`;

const today = new Date().toISOString().split('T')[0];
document.getElementById('record-date').value = today;

const waterSlider = document.getElementById('water-ml');
const waterVal = document.getElementById('water-val');
waterSlider.addEventListener('input', () => { waterVal.textContent = waterSlider.value; });

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('mood-emoji').value = btn.dataset.emoji;
  });
});

const dateInput = document.getElementById('record-date');
dateInput.addEventListener('change', () => loadRecord(dateInput.value));

function loadRecord(date) {
  fetch(`/api/record/${date}`)
    .then(r => r.json())
    .then(d => {
      if (!d) { clearForm(false); return; }
      document.getElementById('weight').value = d.weight ?? '';
      document.getElementById('breakfast').value = d.breakfast ?? '';
      document.getElementById('lunch').value = d.lunch ?? '';
      document.getElementById('dinner').value = d.dinner ?? '';
      document.getElementById('snack').value = d.snack ?? '';
      document.getElementById('water-ml').value = d.water_ml ?? 1500;
      waterVal.textContent = d.water_ml ?? 1500;
      document.getElementById('exercise').value = d.exercise ?? '';
      document.getElementById('had-bowel').checked = !!d.had_bowel_movement;
      document.getElementById('diary').value = d.diary ?? '';
      document.getElementById('gratitude-1').value = d.gratitude_1 ?? '';
      document.getElementById('gratitude-2').value = d.gratitude_2 ?? '';
      document.getElementById('gratitude-3').value = d.gratitude_3 ?? '';
      document.getElementById('mood-emoji').value = d.mood_emoji ?? '';
      document.querySelectorAll('.mood-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.emoji === d.mood_emoji);
      });
    });
}

loadRecord(today);

function saveRecord() {
  const data = {
    record_date: document.getElementById('record-date').value,
    weight: parseFloat(document.getElementById('weight').value) || null,
    breakfast: document.getElementById('breakfast').value.trim() || null,
    lunch: document.getElementById('lunch').value.trim() || null,
    dinner: document.getElementById('dinner').value.trim() || null,
    snack: document.getElementById('snack').value.trim() || null,
    water_ml: parseInt(document.getElementById('water-ml').value),
    exercise: document.getElementById('exercise').value.trim() || null,
    had_bowel_movement: document.getElementById('had-bowel').checked,
    mood_emoji: document.getElementById('mood-emoji').value || null,
    diary: document.getElementById('diary').value.trim() || null,
    gratitude_1: document.getElementById('gratitude-1').value.trim() || null,
    gratitude_2: document.getElementById('gratitude-2').value.trim() || null,
    gratitude_3: document.getElementById('gratitude-3').value.trim() || null,
  };

  fetch('/api/record', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) showToast('✅ 記錄儲存成功！');
    else showToast('❌ 儲存失敗：' + res.error);
  })
  .catch(() => showToast('❌ 網路錯誤，請再試一次'));
}

function clearForm(resetDate = true) {
  if (resetDate) document.getElementById('record-date').value = today;
  ['weight','breakfast','lunch','dinner','snack','exercise','diary',
   'gratitude-1','gratitude-2','gratitude-3','mood-emoji'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('water-ml').value = 1500;
  waterVal.textContent = 1500;
  document.getElementById('had-bowel').checked = false;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
